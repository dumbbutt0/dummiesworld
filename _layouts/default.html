<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: page.dek | default: site.description }}" />
  <meta name="author" content="{{ site.author }}" />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{{ page.description | default: page.dek | default: site.description }}" />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  {% if page.layout == 'post' %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />{% endif %}
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ page.image | default: '/assets/sysop.png' | absolute_url }}" />
  <meta property="og:image:alt" content="{{ site.title }}" />
  <meta name="twitter:card" content="{{ page.twitter_card | default: 'summary' }}" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta name="twitter:description" content="{{ page.description | default: page.dek | default: site.description }}" />
  <meta name="twitter:image" content="{{ page.image | default: '/assets/sysop.png' | absolute_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
  {%- feed_meta -%}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="scanlines" aria-hidden="true"></div>
  {{ content }}
</body>
</html>
