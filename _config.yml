title: dummiesworld
tagline: "a personal BBS · est. 2026 · 24/7 · 1200 baud welcome"
description: "notes on building AI systems on a budget — memory, tools, agents, knowledge graphs."
url: "https://dumbbutt.tech"
author: dumbbutt0
repo_url: "https://github.com/dumbbutt0/claude-wiki-public"

permalink: /posts/:title/
plugins:
  - jekyll-feed
feed:
  path: feed.xml

# the blog is the site; the system code + wiki pages stay in the repo but out of the build
exclude:
  - tools
  - .claude
  - 07_visualizer
  - 02_sources
  - 03_wiki
  - 04_synthesis
  - 05_blueprints
  - 06_templates
  - 08_maintenance
  - "*.py"
  - "*.sh"
  - "*.service"
  - "*.timer"
  - graph-public.json
  - graph-manifest.json
  - CLAUDE.md
  - README.md
  - LICENSE
  - LICENSE-docs.md
