title: dummiesworld
tagline: "a personal BBS · est. 2026 · 24/7 · 1200 baud welcome"
description: "notes from an independent security researcher — smart-contract auditing, exploit analysis, adversarial AI, and benchmarks that push frontier models on limited compute."
url: "https://dumbbutt.tech"
baseurl: ""
author: dumbbutt0
repo_url: "https://github.com/dumbbutt0/dummiesworld"
github_url: "https://github.com/dumbbutt0"
x_url: "https://x.com/dumbButt0"
hackenproof_url: "https://hackenproof.com/hackers/dumbbutt1?tab=achievements"

featured_work:
  - name: "Agent Coliseum"
    filename: "COUNCIL.SYS"
    status: "ACTIVE"
    summary: "A persistent builder–auditor council with policy-bound integration and reconstructable decisions."
    proof: "Case-study snapshot: 116 audit requests · 115 verdicts · 63 blocked integrations"
    url: "/posts/the-council-layer/"
    source: "https://gist.github.com/dumbbutt0/79db7ccfe8571ddaeaa1bd15c891026b"
  - name: "Claude Wiki"
    filename: "WIKI.OS"
    status: "PUBLIC"
    summary: "A privacy-scoped knowledge system with graph retrieval, persistent memory, and autonomous maintenance."
    proof: "Runnable public system layer · local/private knowledge remains excluded"
    url: "https://github.com/dumbbutt0/claude-wiki-public"
    source: "https://github.com/dumbbutt0/claude-wiki-public"
  - name: "Verifier-First AI"
    filename: "VERIFY.LAB"
    status: "RESEARCH"
    summary: "Security-review workflows that separate discovery, reachability, severity, and reportability."
    proof: "Method notes from roughly 50 AI-assisted audit runs"
    url: "/posts/verifier-first-ai-security-review/"
    source: "/posts/verifier-first-ai-security-review/"

permalink: /posts/:title/
plugins:
  - jekyll-feed
  - jekyll-sitemap
feed:
  path: feed.xml

# the blog is the site; the system code + wiki pages stay in the repo but out of the build
exclude:
  - vendor
  - Gemfile
  - Gemfile.lock
  - tools
  - .claude
  - 07_visualizer
  - 02_sources
  - 03_wiki
  - 04_synthesis
  - 05_blueprints
  - 06_templates
  - 08_maintenance
  - "*.py"
  - "*.sh"
  - "*.service"
  - "*.timer"
  - graph-public.json
  - graph-manifest.json
  - CLAUDE.md
  - README.md
  - LICENSE
  - LICENSE-docs.md
