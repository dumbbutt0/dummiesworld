<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Authorization code</title>
  <style>
    body { background:#0b0f17; color:#e6edf3; font-family:system-ui,-apple-system,sans-serif;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .box { max-width:720px; padding:2rem; text-align:center; }
    h2 { color:#5fd0c5; font-weight:600; }
    code { display:block; background:#121826; border:1px solid #2a3441; border-radius:8px;
           padding:1rem; margin:1.25rem 0; word-break:break-all; font-size:1.05rem; color:#5fd0c5; }
    button { background:#4f9dde; color:#fff; border:0; border-radius:6px; padding:.6rem 1.4rem;
             font-size:1rem; cursor:pointer; }
    button:active { transform:translateY(1px); }
    p { color:#9aa6b2; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Authorization code</h2>
    <p>Copy this code and paste it back to continue:</p>
    <code id="c">(no code found in URL)</code>
    <button onclick="navigator.clipboard.writeText(document.getElementById('c').textContent); this.textContent='Copied ✓';">Copy code</button>
    <p style="margin-top:1.5rem; font-size:.85rem;">You can close this tab afterwards.</p>
  </div>
  <script>
    var code = new URLSearchParams(location.search).get('code');
    if (code) document.getElementById('c').textContent = code;
  </script>
</body>
</html>
